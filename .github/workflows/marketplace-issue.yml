name: Notify marketplace on release

# Opens an issue on the personal marketplace (kerryhatcher/hatch-plugins) when a GitHub
# Release is published (releases are cut by release-please.yml). See AGENTS.md for the
# token setup. Missing token -> logs and exits 0 (no failure).

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Open marketplace issue
        env:
          # Fine-grained PAT with Issues:write on kerryhatcher/hatch-plugins.
          GH_TOKEN: ${{ secrets.HATCH_PLUGINS_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "HATCH_PLUGINS_TOKEN not set; skipping. Would have notified for $TAG."
            exit 0
          fi

          gh issue create -R kerryhatcher/hatch-plugins \
            --title "Add/update whachadoin plugin $TAG" \
            --body "Please add/update the **whachadoin** plugin in the marketplace.

          - Source repo: https://github.com/kerryhatcher/whachadoin
          - Plugin path: \`./plugin\` (manifest: \`plugin/.claude-plugin/plugin.json\`)
          - Release: $TAG ($RELEASE_URL)
          - Adds cross-session work logging + todo tracking via the \`kwd\` CLI.

          _Opened automatically by whachadoin's marketplace-issue workflow on release publish._"
