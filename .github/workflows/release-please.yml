name: release-please

# Maintains a release PR from Conventional Commits; merging it bumps the version,
# updates CHANGELOG.md, tags, and publishes a GitHub Release. The release then triggers
# marketplace-issue.yml. See AGENTS.md.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
